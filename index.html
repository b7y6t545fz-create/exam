            { title: "遵守标准化作业的“三按原则”是指", answer: ["图纸、工艺、标准"], answerText: "图纸、工艺、标准" }

// 已用题目追踪（按岗位+题型记录题目标题，避免重复出题）  
var usedQuestions = {};  
// 答题统计：记录每题的对错历史，用于优先级排序  
var questionStats = {};  
  
function completeQuestions(arr, target, type, stationName) {  
    var result = arr.slice();  
    var bank = STATION_BANKS[stationName];  
    if (!bank) return result;  
    while (result.length < target) {  
        if (bank[type] && bank[type].length > 0) {  
            result.push(JSON.parse(JSON.stringify(bank[type][0])));  
        } else {  
            var placeholder = { title: "补充题目", options: ["A","B","C","D"], answer: "A", answerText: "A" };  
            if (type === 'fill') placeholder = { title: "补充填空", answer: ["答案"], answerText: "答案" };  
            if (type === 'essay') placeholder = { title: "补充问答", answer: ["参考要点"], answerText: "参考要点" };  
            result.push(placeholder);  
        }  
    }  
    return result;  
}  
function getStationFullBank(station) {  
    var raw = STATION_BANKS[station];  
    if (!raw) return null;  
    var single = completeQuestions(raw.single || [], 6, 'single', station);  
    var multiple = completeQuestions(raw.multiple || [], 6, 'multiple', station);  
    var judge = completeQuestions(raw.judge || [], 6, 'judge', station);  
    var fill = completeQuestions(raw.fill || [], 8, 'fill', station);  
    // 题库无简答题时跳过，不补占位题  
    var essay = (raw.essay && raw.essay.length > 0) ? completeQuestions(raw.essay, 4, 'essay', station) : [];  
    return { single: single, multiple: multiple, judge: judge, fill: fill, essay: essay };  
}  
  
// 从题库中随机抽题，排除已使用的题目  
function sampleFrom(arr, count, type, station) {  
    if (!arr || arr.length === 0) return [];  
    var key = station + "|" + type;  
    if (!usedQuestions[key]) usedQuestions[key] = [];  
    if (!questionStats[key]) questionStats[key] = {};  
    var used = usedQuestions[key];  
    var stats = questionStats[key];  
    // 过滤掉最近用过的题目（避免相邻两次重复）  
    var available = [];  
    for (var i = 0; i < arr.length; i++) {  
        var found = false;  
        for (var u = 0; u < used.length; u++) {  
            if (used[u] === arr[i].title) { found = true; break; }  
        }  
        if (!found) available.push(arr[i]);  
    }  
    // 如果可用题不够，重置已用记录  
    if (available.length < count) {  
        usedQuestions[key] = [];  
        available = arr.slice();  
    }  
    // 按优先级分组：错过的优先，没用过的其次，对过的最后  
    var wrongGroup = [], unusedGroup = [], correctGroup = [];  
    for (var i = 0; i < available.length; i++) {  
        var s = stats[available[i].title];  
        if (!s) { unusedGroup.push(available[i]); }  
        else if (s.last === 'wrong') { wrongGroup.push(available[i]); }  
        else { correctGroup.push(available[i]); }  
    }  
    // 错题按错次数降序排列（错得越多越优先）  
    wrongGroup.sort(function(a, b) {   
        var wa = (stats[a.title] && stats[a.title].timesWrong) || 0;  
        var wb = (stats[b.title] && stats[b.title].timesWrong) || 0;  
        return wb - wa;  
    });  
    // 未用题和正确题各自随机洗牌  
    function shuffle(a) {  
        for (var i = a.length - 1; i > 0; i--) {  
            var j = Math.floor(Math.random() * (i + 1));  
            var tmp = a[i]; a[i] = a[j]; a[j] = tmp;  
        }  
    }  
    shuffle(unusedGroup);  
    shuffle(correctGroup);  
    // 合并：错题优先 → 未用题 → 正确题  
    var sorted = wrongGroup.concat(unusedGroup).concat(correctGroup);  
    var picked = sorted.slice(0, count);  
    // 记录已用  
    for (var p = 0; p < picked.length; p++) {  
        usedQuestions[key].push(picked[p].title);  
    }  
    return picked;  
}  
function generateExam(station) {  
    var full = getStationFullBank(station);  
    if (!full) return [];  
    var singleList = sampleFrom(full.single, 6, 'single', station);  
    var multipleList = sampleFrom(full.multiple, 6, 'multiple', station);  
    var judgeList = sampleFrom(full.judge, 6, 'judge', station);  
    var fillList = sampleFrom(full.fill, 8, 'fill', station);  
    var essayList = sampleFrom(full.essay, 4, 'essay', station);  
    var all = [];  
    var counter = 1;  
    for (var i=0; i<singleList.length; i++) { var q = singleList[i]; all.push({ id: 's'+counter++, type: 'single', title: q.title, options: q.options, answer: q.answer, answerText: q.answerText }); }  
    for (var i=0; i<multipleList.length; i++) { var q = multipleList[i]; all.push({ id: 'm'+counter++, type: 'multiple', title: q.title, options: q.options, answer: q.answer, answerText: q.answerText }); }  
    for (var i=0; i<judgeList.length; i++) { var q = judgeList[i]; all.push({ id: 'j'+counter++, type: 'judge', title: q.title, options: q.options, answer: q.answer, answerText: q.answerText }); }  
    for (var i=0; i<fillList.length; i++) { var q = fillList[i]; all.push({ id: 'f'+counter++, type: 'fill', title: q.title, options: [], answer: q.answer, answerText: q.answerText }); }  
    for (var i=0; i<essayList.length; i++) { var q = essayList[i]; all.push({ id: 'e'+counter++, type: 'essay', title: q.title, options: [], answer: q.answer, answerText: q.answerText }); }  
    return all;  
}  
  
var currentStation = "模切岗";  
var currentExam = [];  
var userAnswers = {};  
  
var stationSelect = document.getElementById('stationSelect');  
var newExamBtn = document.getElementById('newExamBtn');  
var submitBtn = document.getElementById('submitBtn');  
var resetBtn = document.getElementById('resetBtn');  
var container = document.getElementById('questionsContainer');  
var scoreSpan = document.getElementById('scoreDisplay');  
var resultDiv = document.getElementById('resultArea');  
  
function renderExam() {  
    if (!currentExam.length) {  
        container.innerHTML = '<div style="padding:30px;text-align:center">请选择岗位并点击"生成试卷"</div>';  
        return;  
    }  
    var html = '';  
    var groups = [  
        { name: "单选题", type: "single" },  
        { name: "多选题", type: "multiple" },  
        { name: "判断题", type: "judge" },  
        { name: "填空题", type: "fill" },  
        { name: "问答题", type: "essay" }  
    ];  
    for (var g=0; g<groups.length; g++) {  
        var group = groups[g];  
        var qs = currentExam.filter(function(q) { return q.type === group.type; });  
        if (qs.length === 0) continue;  
        html += '<div class="section-title">'+group.name+' ('+qs.length+'题)</div>';  
        for (var idx=0; idx<qs.length; idx++) {  
            var q = qs[idx];  
            var saved = userAnswers[q.id] || (q.type === 'multiple' ? [] : '');  
            var inputHtml = '';  
            if (q.type === 'single') {  
                var opts = q.options;  
                inputHtml = '<div class="options">';  
                for (var i=0; i<opts.length; i++) {  
                    var val = String.fromCharCode(65+i);  
                    var checked = (saved === val) ? 'checked' : '';  
                    inputHtml += '<label class="option-item"><input type="radio" name="'+q.id+'" value="'+val+'" '+checked+'> '+val+'. '+opts[i]+'</label>';  
                }  
                inputHtml += '</div>';  
            } else if (q.type === 'judge') {  
                inputHtml = '<div class="options">';  
                var vals = ['对', '错'];  
                for (var i=0; i<2; i++) {  
                    var checked = (saved === vals[i]) ? 'checked' : '';  
                    inputHtml += '<label class="option-item"><input type="radio" name="'+q.id+'" value="'+vals[i]+'" '+checked+'> '+vals[i]+'</label>';  
                }  
                inputHtml += '</div>';  
            } else if (q.type === 'multiple') {  
                var opts = q.options;  
                var selectedSet = Array.isArray(saved) ? saved : [];  
                inputHtml = '<div class="options" style="flex-direction:column;">';  
                for (var i=0; i<opts.length; i++) {  
                    var val = String.fromCharCode(65+i);  
                    var checked = (selectedSet.indexOf(val) !== -1) ? 'checked' : '';  
                    inputHtml += '<label style="display:flex; gap:8px;"><input type="checkbox" name="'+q.id+'" value="'+val+'" '+checked+'> '+val+'. '+opts[i]+'</label>';  
                }  
                inputHtml += '</div>';  
            } else if (q.type === 'fill') {  
                inputHtml = '<input type="text" class="fill-input" data-id="'+q.id+'" value="'+(saved || '')+'" placeholder="多个答案用逗号分隔">';  
            } else if (q.type === 'essay') {  
                inputHtml = '<textarea rows="2" data-id="'+q.id+'" placeholder="请简述">'+(saved || '')+'</textarea>';  
            }  
            html += '<div class="question-card" data-qid="'+q.id+'"><div class="question-header"><strong>'+(idx+1)+'.</strong> '+escapeHtml(q.title)+'</div>'+inputHtml+'</div>';  
        }  
    }  
    container.innerHTML = html;  
    for (var i=0; i<currentExam.length; i++) {  
        var q = currentExam[i];  
        if (q.type === 'single' || q.type === 'judge') {  
            var radios = document.querySelectorAll('input[type="radio"][name="'+q.id+'"]');  
            for (var r=0; r<radios.length; r++) {  
                radios[r].addEventListener('change', (function(qid) { return function(e) { userAnswers[qid] = e.target.value; }; })(q.id));  
            }  
        } else if (q.type === 'multiple') {  
            var chks = document.querySelectorAll('input[type="checkbox"][name="'+q.id+'"]');  
            for (var c=0; c<chks.length; c++) {  
                chks[c].addEventListener('change', (function(qid, chksArr) {  
                    return function() {  
                        var selected = [];  
                        for (var k=0; k<chksArr.length; k++) if (chksArr[k].checked) selected.push(chksArr[k].value);  
                        userAnswers[qid] = selected;  
                    };  
                })(q.id, chks));  
            }  
        } else if (q.type === 'fill') {  
            var inp = document.querySelector('input.fill-input[data-id="'+q.id+'"]');  
            if (inp) inp.addEventListener('input', (function(qid) { return function(e) { userAnswers[qid] = e.target.value; }; })(q.id));  
        } else if (q.type === 'essay') {  
            var ta = document.querySelector('textarea[data-id="'+q.id+'"]');  
            if (ta) ta.addEventListener('input', (function(qid) { return function(e) { userAnswers[qid] = e.target.value; }; })(q.id));  
        }  
    }  
}  
  
function computeScore() {  
    var correct = 0;  
    var details = [];  
    for (var i=0; i<currentExam.length; i++) {  
        var q = currentExam[i];  
        var user = userAnswers[q.id];  
        var isCorrect = false;  
        if (q.type === 'single' || q.type === 'judge') {  
            if (user && user === q.answer) isCorrect = true;  
        } else if (q.type === 'multiple') {  
            var stdSet = new Set(q.answer);  
            var userSet = new Set(Array.isArray(user) ? user : []);  
            if (stdSet.size === userSet.size && [...stdSet].every(function(v) { return userSet.has(v); })) isCorrect = true;  
        } else if (q.type === 'fill') {  
            var stdArr = q.answer.map(function(s) { return s.trim().toLowerCase(); });  
            var userNorm = (user || '').trim().toLowerCase().replace(/[，,、]/g, ',');  
            var match = false;  
            for (var s=0; s<stdArr.length; s++) {  
                if (userNorm === stdArr[s] || (userNorm.indexOf(stdArr[s]) !== -1 && stdArr[s].length>2)) { match=true; break; }  
            }  
            if (match) isCorrect = true;  
        } else if (q.type === 'essay') {  
            if (user && user.trim().length > 3) isCorrect = true;  
        }  
        if (isCorrect) correct++;  
        // 记录答题统计，用于下次出题优先级  
        var statKey = currentStation + '|' + q.type;  
        if (!questionStats[statKey]) questionStats[statKey] = {};  
        var qStat = questionStats[statKey][q.title];  
        if (!qStat) qStat = questionStats[statKey][q.title] = { timesWrong: 0, timesCorrect: 0, last: null };  
        if (isCorrect) { qStat.timesCorrect++; qStat.last = 'correct'; }  
        else { qStat.timesWrong++; qStat.last = 'wrong'; }  
        details.push({ title: q.title, user: user, correct: isCorrect, answerText: q.answerText });  
    }  
    var percent = (correct / currentExam.length * 100).toFixed(1);  
    scoreSpan.innerText = '⭐ '+percent+'分 ('+correct+'/'+currentExam.length+')';  
    var resultHtml = '<div class="result-box"><strong>得分: '+percent+'分 ('+correct+'/'+currentExam.length+')</strong><br>';  
    if (correct === currentExam.length) {  
        resultHtml += '🎉 满分！';  
    } else {  
        resultHtml += '❌ 错题正确答案：<ul>';  
        for (var d=0; d<details.length; d++) {  
            if (!details[d].correct) {  
                var userShow = (details[d].user === undefined || details[d].user === null || details[d].user === '') ? '未作答' : (Array.isArray(details[d].user) ? details[d].user.join(',') : details[d].user);  
                resultHtml += '<li><strong>'+escapeHtml(details[d].title)+'</strong><br> 你的答案: '+escapeHtml(userShow)+'<br> <span class="correct-ans">✅ 正确答案：'+escapeHtml(details[d].answerText)+'</span></li>';  
            }  
        }  
        resultHtml += '</ul>';  
    }  
    resultHtml += '</div>';  
    resultDiv.innerHTML = resultHtml;  
    resultDiv.style.display = 'block';  
    var cards = document.querySelectorAll('.question-card');  
    for (var c=0; c<cards.length; c++) {  
        cards[c].classList.remove('wrong-card');  
        var oldAns = cards[c].querySelector('.card-answer');  
        if (oldAns) oldAns.remove();  
    }  
    for (var d=0; d<details.length; d++) {  
        if (!details[d].correct && cards[d]) {  
            cards[d].classList.add('wrong-card');  
            var ansDiv = document.createElement('div');  
            ansDiv.className = 'card-answer correct-ans';  
            ansDiv.innerHTML = '✅ 正确答案：' + escapeHtml(details[d].answerText);  
            cards[d].appendChild(ansDiv);  
        }  
    }  
}  
  
function resetAnswers() {  
    userAnswers = {};  
    renderExam();  
    resultDiv.style.display = 'none';  
    scoreSpan.innerText = '⚡ 未评分';  
}  
  
function newExam() {  
    currentExam = generateExam(currentStation);  
    userAnswers = {};  
    renderExam();  
    resultDiv.style.display = 'none';  
    scoreSpan.innerText = '⚡ 未评分';  
}  
  
function initStations() {  
    var stations = Object.keys(STATION_BANKS);  
    var optionsHtml = '';  
    for (var i=0; i<stations.length; i++) {  
        optionsHtml += '<option value="'+stations[i]+'" '+(stations[i]===currentStation ? 'selected' : '')+'>'+stations[i]+'</option>';  
    }  
    stationSelect.innerHTML = optionsHtml;  
    stationSelect.addEventListener('change', function(e) {  
        currentStation = e.target.value;  
        newExam();  
    });  
}  
  
function escapeHtml(str) {  
    if (!str) return '';  
    return str.replace(/[&<>]/g, function(m) {  
        if (m === '&') return '&amp;';  
        if (m === '<') return '&lt;';  
        if (m === '>') return '&gt;';  
        return m;  
    });  
}  
  
initStations();  
newExam();  
newExamBtn.addEventListener('click', newExam);  
submitBtn.addEventListener('click', computeScore);  
resetBtn.addEventListener('click', resetAnswers);  
</script>
